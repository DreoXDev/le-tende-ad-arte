name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22
        env:
          # Aggiungi il token GA nelle Secrets della repo GitHub:
          # Settings → Secrets and variables → Actions → New repository secret
          # Nome: GA_MEASUREMENT_ID  Valore: G-XXXXXXXXXX (il tuo ID reale)
          PUBLIC_GA_ID: ${{ secrets.GA_MEASUREMENT_ID }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
